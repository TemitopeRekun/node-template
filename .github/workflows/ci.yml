name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      USE_MOCK_MODEL: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Format check + lint (application code only; the vendored core/ ships
      # with its own pre-existing lint debt) + unit tests with a coverage gate.
      - name: Verify
        run: npm run verify
